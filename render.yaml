services:
  - type: web
    name: melo-dj
    runtime: docker
    repo: https://github.com/manlinayu-code/melo-dj
    branch: main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: melo-dj-db
          property: connectionString
      - key: APP_ID
        generateValue: true
      - key: APP_SECRET
        generateValue: true
      - key: KIMI_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: FISH_AUDIO_API_KEY
        sync: false
    healthCheckPath: /health
    preDeployCommand: npm run db:push

  - type: mysql
    name: melo-dj-db
    plan: free
    databaseName: melo_dj
